{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block content %}

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <h1 class="mb-4">Edit Pet Listing: {{ pet.name }}</h1>

            <form method="post" enctype="multipart/form-data" class="card p-4 shadow-sm">
                {% csrf_token %}
                {{ form|crispy }}

                <div class="d-flex gap-2 mt-4">
                    <button type="submit" class="btn btn-success">Save Changes</button>
                    <a href="{% url 'pet_detail' pet.id %}" class="btn btn-outline-secondary">Cancel</a>
                </div>
            </form>

            <div class="alert alert-warning mt-4" role="alert">
                <strong>Note:</strong> Editing a pet listing sets it back to pending approval for admin review.
            </div>
        </div>
    </div>
</div>

{% endblock %}
