{% extends "base.html" %}
{% block content %}

<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-6">
            <div class="card shadow-sm border-danger">
                <div class="card-body">
                    <h1 class="h3 mb-4 text-danger">Delete Pet Listing</h1>
                    <p>You are about to delete <strong>{{ pet.name }}</strong>.</p>
                    <p class="text-muted">This action cannot be undone.</p>

                    <form method="post" class="d-flex gap-2">
                        {% csrf_token %}
                        <button type="submit" class="btn btn-danger">Delete</button>
                        <a href="{% url 'my_pets' %}" class="btn btn-outline-secondary">Cancel</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

{% endblock %}
